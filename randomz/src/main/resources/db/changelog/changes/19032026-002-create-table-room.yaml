databaseChangeLog:
  - changeSet:
      id: 002-01
      author: van.qui
      failOnError: true
      preConditions:
        - onFail: MARK_RAN
        - not:
            - tableExists:
                tableName: room
      changes:
        - createTable:
            tableName: room
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
              - column:
                  name: name
                  type: varchar(255)
              - column:
                  name: description
                  type: varchar(255)
              - column:
                  name: status
                  type: varchar(50)
              - column:
                  name: current_mode
                  type: varchar(50)
              - column:
                  name: start_time
                  type: timestamp
              - column:
                  name: duration
                  type: bigint
              - column:
                  name: team_id
                  type: uuid
              - column:
                  name: created_date
                  type: timestamp
              - column:
                  name: updated_date
                  type: timestamp
              - column:
                  name: deleted_date
                  type: timestamp
              - column:
                  name: created_by
                  type: varchar(255)
              - column:
                  name: updated_by
                  type: varchar(255)
              - column:
                  name: deleted_by
                  type: varchar(255)
              - column:
                  name: is_deleted
                  type: boolean
                  defaultValueBoolean: false
      rollback:
        - dropTable:
            tableName: room
