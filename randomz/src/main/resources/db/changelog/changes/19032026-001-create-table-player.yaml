databaseChangeLog:
  - changeSet:
      id: 001-01
      author: van.qui
      failOnError: true
      preConditions:
        - onFail: MARK_RAN
        - not:
            - tableExists:
                tableName: player
      changes:
        - createTable:
            tableName: player
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
              - column:
                  name: name
                  type: varchar(255)
              - column:
                  name: created_date
                  type: timestamp
              - column:
                  name: updated_date
                  type: timestamp
              - column:
                  name: deleted_date
                  type: timestamp
              - column:
                  name: created_by
                  type: varchar(255)
              - column:
                  name: updated_by
                  type: varchar(255)
              - column:
                  name: deleted_by
                  type: varchar(255)
              - column:
                  name: is_deleted
                  type: boolean
                  defaultValueBoolean: false
      rollback:
        - dropTable:
            tableName: player
